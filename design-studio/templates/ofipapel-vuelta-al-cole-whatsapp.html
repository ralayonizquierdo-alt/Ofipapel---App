<meta name="hz:canvas-width" content="1080">

<title>Ofipapel — Vuelta al Cole 2026 — Imagen WhatsApp</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;0,700;0,800;1,400&family=IBM+Plex+Mono:wght@600&display=swap');

  :root{ --azul:#1A5C1A; --acento:#8DC41E; --acento2:#F5A623; }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;}

  /* Texto mínimo y muy grande: esta pieza se ve casi siempre en miniatura
     dentro de un chat, así que prioriza legibilidad sobre densidad de info. */
  .wa{
    position:relative;width:1080px;height:1080px;
    background:linear-gradient(160deg,#0d3d0d 0%,#1A5C1A 50%,#2f8a2f 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;overflow:hidden;
  }
  .deco{position:absolute;border-radius:50%;background:var(--acento);opacity:0.14;}
  .c1{width:480px;height:480px;top:-160px;left:-160px;}
  .c2{width:380px;height:380px;bottom:-160px;right:-140px;background:var(--acento2);opacity:0.12;}

  .logo-chip{background:#fff;border-radius:20px;padding:18px 32px;box-shadow:0 14px 34px rgba(0,0,0,0.24);position:relative;z-index:2;}
  .logo-chip img{height:70px;display:block;}

  .headline{position:relative;z-index:2;margin-top:48px;font-size:88px;font-weight:800;color:#fff;line-height:1.02;letter-spacing:-1.5px;}
  .headline em{font-style:normal;color:var(--acento);display:block;}

  .cta{
    position:relative;z-index:2;margin-top:52px;
    background:var(--acento);color:#153515;font-weight:800;font-size:40px;
    padding:26px 48px;border-radius:20px;box-shadow:0 16px 38px rgba(0,0,0,0.3);
  }
  .phone{position:relative;z-index:2;margin-top:24px;font-family:'IBM Plex Mono',monospace;color:#dff0d8;font-size:26px;letter-spacing:1px;}
</style>
</head>
