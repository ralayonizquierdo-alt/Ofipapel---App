[build]
  command = "bash build.sh"
  publish = "_site"

[build.environment]
  NODE_VERSION = "20"
  # fichaje.html incluye la apiKey pública de Firebase (Ofipapel Fichaje) —
  # es un identificador de proyecto, no un secreto (mismo modelo que el resto
  # de claves cliente de este repo, ver CLAUDE.md). El escaneo de secretos de
  # Netlify la detecta como falso positivo y bloquea el deploy.
  SECRETS_SCAN_OMIT_PATHS = "fichaje.html"

[functions]
  directory = "netlify/functions"

# SPA routing: cualquier ruta bajo /alquileres/ sirve el index de la app
[[redirects]]
  from = "/alquileres/*"
  to = "/alquileres/index.html"
  status = 200

[[redirects]]
  from = "/joe/*"
  to = "/joe/index.html"
  status = 200

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/alquileres/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
