<svg viewBox="0 0 300 90" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Canarias INK">
  <defs>
    <linearGradient id="dropGrad" x1="0.35" y1="0" x2="0.65" y2="1">
      <stop offset="0%" stop-color="#50EEFF"/>
      <stop offset="100%" stop-color="#0088BB"/>
    </linearGradient>
    <filter id="glow" x="-35%" y="-25%" width="170%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Ink drop — tip at (42,5), bottom circle center (42,62) radius 24 -->
  <path d="M 42 5 C 62 20 66 42 66 62 A 24 24 0 0 1 18 62 C 18 42 22 20 42 5 Z"
        fill="url(#dropGrad)" filter="url(#glow)"/>
  <!-- Inner highlight -->
  <ellipse cx="34" cy="50" rx="6" ry="10" fill="white" opacity="0.20"/>
  <!-- Specular dot -->
  <circle cx="31" cy="37" r="2.5" fill="white" opacity="0.42"/>

  <!-- Vertical separator -->
  <line x1="82" y1="18" x2="82" y2="72" stroke="#2A2E48" stroke-width="1.2"/>

  <!-- CANARIAS — light weight, wide tracking -->
  <text x="97" y="42"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, 'Helvetica Neue', Arial, sans-serif"
        font-size="24" font-weight="300" letter-spacing="5.5"
        fill="#D8DFF2">CANARIAS</text>

  <!-- INK — black weight, cyan, wider tracking -->
  <text x="98" y="68"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, 'Helvetica Neue', Arial, sans-serif"
        font-size="22" font-weight="900" letter-spacing="11"
        fill="#00D4FF">INK</text>
</svg>
