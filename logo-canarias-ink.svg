<svg viewBox="0 0 320 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Canarias INK">
  <defs>
    <linearGradient id="dropGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#40E8FF"/>
      <stop offset="100%" stop-color="#0099CC"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Ink drop — tip at (48,6), bottom circle center (48,68) radius 27 -->
  <path d="M 48 6 C 72 22 75 45 75 68 A 27 27 0 0 1 21 68 C 21 45 24 22 48 6 Z"
        fill="url(#dropGrad)" filter="url(#glow)"/>
  <!-- Inner highlight -->
  <ellipse cx="39" cy="55" rx="7" ry="11" fill="white" opacity="0.22"/>
  <!-- Tiny specular dot -->
  <circle cx="36" cy="44" r="2.5" fill="white" opacity="0.4"/>

  <!-- Vertical separator -->
  <line x1="92" y1="20" x2="92" y2="80" stroke="#2A2E48" stroke-width="1.5"/>

  <!-- CANARIAS — light weight, wide tracking -->
  <text x="107" y="44"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, 'Helvetica Neue', Arial, sans-serif"
        font-size="26" font-weight="300" letter-spacing="6"
        fill="#E4E8F4">CANARIAS</text>

  <!-- INK — bold, cyan, wider tracking -->
  <text x="108" y="72"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, 'Helvetica Neue', Arial, sans-serif"
        font-size="24" font-weight="800" letter-spacing="12"
        fill="#00D4FF">INK</text>
</svg>
