name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            alquileres/package-lock.json
            joe-app/package-lock.json

      - name: Build alquileres
        run: |
          cd alquileres
          npm ci
          npm run build

      - name: Build joe-app
        run: |
          cd joe-app
          npm ci
          npm run build

      - name: Assemble _site
        run: |
          mkdir -p _site/alquileres _site/joe
          # Static files at repo root
          cp Index.html index.html _site/
          cp canarias-ink.html falcontrol.html importacion-pedidos-proveedores.html privacidad.html vacaciones.html _site/
          cp fondo-ofipapel.jpg hero-productos.jpg logo-canarias-ink.png logo-ofipapel.png _site/
          cp sw.js sw-ink.js _site/
          [ -f _redirects ] && cp _redirects _site/ || true
          # Built apps
          cp -r alquileres/dist/. _site/alquileres/
          cp -r joe-app/dist/. _site/joe/

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
