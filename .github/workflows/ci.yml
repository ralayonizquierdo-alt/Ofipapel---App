name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  joe-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: joe-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: joe-app/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  alquileres:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: alquileres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: alquileres/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
