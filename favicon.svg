<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Canarias INK">
  <defs>
    <linearGradient id="dg" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#50EEFF"/>
      <stop offset="100%" stop-color="#0088BB"/>
    </linearGradient>
    <filter id="gl" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="100" height="100" rx="18" fill="#0F1119"/>

  <!-- Ink drop — tip at (50,10), bottom circle center (50,62) radius 32 -->
  <path d="M 50 10 C 75 28 82 50 82 62 A 32 32 0 0 1 18 62 C 18 50 25 28 50 10 Z"
        fill="url(#dg)" filter="url(#gl)"/>

  <!-- Inner highlight -->
  <ellipse cx="40" cy="50" rx="9" ry="14" fill="white" opacity="0.2"/>
  <!-- Specular dot -->
  <circle cx="37" cy="37" r="3.5" fill="white" opacity="0.45"/>
</svg>
