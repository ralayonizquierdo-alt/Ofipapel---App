<style>
  :root {

    --gris: #f5f5f5;
    --gris-medio: #e0e0e0;
    --negro: #1a1a1a;
    --blanco: #ffffff;
    --acento: #ff6f00;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Barlow',sans-serif; background:#e8ebe8; color:var(--negro); }

  /* PORTADA */
  .portada {
    width:210mm; min-height:297mm; margin:0 auto 20px;
    background:var(--verde-oscuro); position:relative;
    overflow:hidden; display:flex; flex-direction:column;
    justify-content:center; align-items:center; page-break-after:always;
  }
  .portada::before { content:''; position:absolute; top:-80px; right:-80px; width:420px; height:420px; border-radius:50%; background:rgba(255,255,255,0.05); }
  .portada::after  { content:''; position:absolute; bottom:-100px; left:-100px; width:500px; height:500px; border-radius:50%; background:rgba(255,255,255,0.04); }
  .portada-stripe  { position:absolute; left:0; top:0; bottom:0; width:14px; background:var(--verde-claro); }
  .portada-inner   { position:relative; z-index:2; text-align:center; padding:60px 50px; }
  .logo-empresa    { font-family:'Barlow Condensed',sans-serif; font-size:72px; font-weight:900; color:#fff; letter-spacing:-2px; line-height:1; }
  .logo-empresa span { color:var(--verde-claro); }
  .logo-sub        { font-size:13px; letter-spacing:4px; color:rgba(255,255,255,0.6); text-transform:uppercase; margin-top:8px; }
  .portada-divider { width:80px; height:4px; background:var(--verde-claro); margin:44px auto; border-radius:2px; }
  .portada-titulo  { font-family:'Barlow Condensed',sans-serif; font-size:50px; font-weight:900; color:#fff; text-transform:uppercase; letter-spacing:3px; line-height:1.1; }
  .portada-titulo em { color:var(--acento); font-style:normal; display:block; font-size:80px; letter-spacing:-1px; }
  .portada-fecha   { margin-top:32px; font-size:13px; color:rgba(255,255,255,0.55); letter-spacing:3px; text-transform:uppercase; }
  .portada-contacto { position:absolute; bottom:40px; left:0; right:0; text-align:center; color:rgba(255,255,255,0.45); font-size:11.5px; letter-spacing:1px; }

  /* PÁGINA */
  .pagina { width:210mm; min-height:297mm; margin:0 auto 20px; background:#fff; position:relative; page-break-after:always; overflow:hidden; }
  .pagina-contenido { padding-bottom:34px; }

  /* CABECERA */
  .page-header { background:var(--verde-oscuro); padding:13px 22px; display:flex; align-items:center; justify-content:space-between; }
  .page-header-logo { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:900; color:#fff; }
  .page-header-logo span { color:var(--verde-claro); }
  .page-header-cat { font-size:11px; color:rgba(255,255,255,0.65); letter-spacing:2px; text-transform:uppercase; }

  /* BANNER SECCIÓN */
  .seccion-banner { background:var(--verde-claro); padding:9px 22px; display:flex; align-items:center; gap:10px; }
  .seccion-banner h2 { font-family:'Barlow Condensed',sans-serif; font-size:19px; font-weight:800; color:#fff; text-transform:uppercase; letter-spacing:1px; }
  .seccion-icon { font-size:18px; }

  /* GRID */
  .productos-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--gris-medio); }

  .producto { background:#fff; padding:11px 9px; display:flex; flex-direction:column; align-items:center; text-align:center; }

  .producto-img-wrap { width:72px; height:72px; display:flex; align-items:center; justify-content:center; margin-bottom:7px; background:var(--gris); border-radius:6px; overflow:hidden; flex-shrink:0; }
  .producto-img-wrap img { width:68px; height:68px; object-fit:contain; }
  .producto-img-wrap .emoji-fallback { font-size:32px; display:none; }
  .producto-img-wrap img.error + .emoji-fallback { display:block; }

  .producto-ref    { font-size:7.5px; color:#aaa; letter-spacing:0.5px; font-weight:600; text-transform:uppercase; margin-bottom:3px; }
  .producto-nombre { font-size:9px; font-weight:700; color:var(--negro); line-height:1.3; margin-bottom:3px; flex-grow:1; }
  .producto-formato{ font-size:8px; color:#777; margin-bottom:6px; line-height:1.3; }
  .producto-precio { background:var(--verde); color:#fff; font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:800; padding:3px 9px; border-radius:4px; }
  .producto-precio small { font-size:9px; opacity:0.8; }

  /* PIE */
  .page-footer { position:absolute; bottom:0; left:0; right:0; height:34px; background:var(--verde-oscuro); display:flex; align-items:center; justify-content:space-between; padding:0 22px; }
  .page-footer span { font-size:9px; color:rgba(255,255,255,0.55); letter-spacing:1px; text-transform:uppercase; }

  @media print { body{background:#fff;} .portada,.pagina{margin:0;box-shadow:none;} }
</style>
